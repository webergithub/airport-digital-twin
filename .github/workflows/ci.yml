name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Headless smoke (90 sim-minutes, contract + KPI + lifecycle checks)
        run: node tests/smoke.mjs
